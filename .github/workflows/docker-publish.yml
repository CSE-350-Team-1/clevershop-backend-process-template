name: Validate Docker Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no run)
        run: |
          docker build \
            --file Dockerfile \
            --tag temp-build-check \
            .
