name: Docker Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t temp-build-check .

      - name: Start container
        run: |
          docker run -d --name app-test temp-build-check

      - name: Check container is still running
        run: |
          sleep 10
          docker ps | grep app-test

      - name: Show container logs
        if: always()
        run: |
          docker logs app-test || true

      - name: Stop and remove container
        if: always()
        run: |
          docker stop app-test || true
          docker rm app-test || true